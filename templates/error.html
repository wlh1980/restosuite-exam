<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Error - RestoSuite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="card rounded-xl p-8 max-w-md w-full text-center">
        <div class="text-6xl mb-4">⚠️</div>
        <h1 class="text-2xl font-bold mb-2 text-red-400">Access Error</h1>
        <p class="text-gray-300 mb-6">{{ error }}</p>
        <div class="text-xs text-gray-500">
            <p>If you believe this is a mistake, please contact your administrator.</p>
        </div>
    </div>
</body>
</html>
